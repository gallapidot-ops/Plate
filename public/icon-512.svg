<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <filter id="s">
      <feDropShadow dx="10" dy="10" stdDeviation="16" flood-color="rgba(0,0,0,0.09)"/>
      <feDropShadow dx="-8" dy="-8" stdDeviation="13" flood-color="rgba(255,255,255,0.95)"/>
    </filter>
  </defs>
  <!-- Neumorphic card -->
  <rect x="20" y="20" width="472" height="472" rx="100" fill="#EFECE6" filter="url(#s)"/>

  <!-- Bars: scale = 192/93 ≈ 2.065, rendered ~192×216px, centred at x=160, top at y=52 -->
  <!-- bar width 18×2.065=37, rx=19, gap 7×2.065=14 -->
  <!-- x: 0=160, 25+14=160+52=212 (gap 14), 50+28=160+103=263, 75+42=160+155=315 -->
  <!-- bar heights: 50×2.065=103, 80×2.065=165, 105×2.065=217, 70×2.065=145 -->
  <!-- bottom y = 52+217=269; y positions: 269-103=166, 269-165=104, 269-217=52, 269-145=124 -->
  <rect x="160" y="166" width="37" height="103" rx="19" fill="#3D4F7C" fill-opacity="0.40"/>
  <rect x="211" y="104" width="37" height="165" rx="19" fill="#3D4F7C" fill-opacity="0.65"/>
  <rect x="262" y="52"  width="37" height="217" rx="19" fill="#3D4F7C" fill-opacity="1.00"/>
  <rect x="313" y="124" width="37" height="145" rx="19" fill="#3D4F7C" fill-opacity="0.65"/>

  <!-- Baseline: y=269+20=289, x=160, width=190 (160 to 350) -->
  <rect x="160" y="289" width="190" height="5" rx="2.5" fill="#3D4F7C"/>

  <!-- PLATE -->
  <text x="256" y="358" text-anchor="middle"
        font-family="Georgia, serif" font-size="58" font-weight="400"
        fill="#3D4F7C" letter-spacing="18">PLATE</text>

  <!-- Tagline -->
  <text x="256" y="395" text-anchor="middle"
        font-family="Georgia, serif" font-size="20" font-weight="400"
        fill="#8A7A85" letter-spacing="5">discover · rate · share</text>
</svg>
