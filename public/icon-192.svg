<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <defs>
    <filter id="s">
      <feDropShadow dx="4" dy="4" stdDeviation="6" flood-color="rgba(0,0,0,0.09)"/>
      <feDropShadow dx="-3" dy="-3" stdDeviation="5" flood-color="rgba(255,255,255,0.95)"/>
    </filter>
  </defs>
  <!-- Neumorphic card -->
  <rect x="8" y="8" width="176" height="176" rx="38" fill="#EFECE6" filter="url(#s)"/>

  <!-- Bars: viewBox 0 0 93 105, rendered ~72×81px, centred at x=60, top at y=20 -->
  <!-- scale = 72/93 ≈ 0.774  →  heights: 50×0.774=39, 80×0.774=62, 105×0.774=81, 70×0.774=54 -->
  <!-- x offsets ×0.774: 0=0+60, 25=19+60, 50=39+60, 75=58+60 -->
  <!-- bar width 18×0.774=14, rx 9×0.774=7 -->
  <!-- y from bottom (y=20+81=101): y=101-39=62, 101-62=39, 101-81=20, 101-54=47 -->
  <rect x="60"  y="62" width="14" height="39" rx="7" fill="#3D4F7C" fill-opacity="0.40"/>
  <rect x="79"  y="39" width="14" height="62" rx="7" fill="#3D4F7C" fill-opacity="0.65"/>
  <rect x="99"  y="20" width="14" height="81" rx="7" fill="#3D4F7C" fill-opacity="1.00"/>
  <rect x="118" y="47" width="14" height="54" rx="7" fill="#3D4F7C" fill-opacity="0.65"/>

  <!-- Baseline: 8px below bars bottom (y=101+8=109), width=72px (60 to 132) -->
  <rect x="60" y="109" width="72" height="2" rx="1" fill="#3D4F7C"/>

  <!-- PLATE: Georgia-style, centred -->
  <text x="96" y="138" text-anchor="middle"
        font-family="Georgia, serif" font-size="22" font-weight="400"
        fill="#3D4F7C" letter-spacing="7">PLATE</text>

  <!-- Tagline -->
  <text x="96" y="153" text-anchor="middle"
        font-family="Georgia, serif" font-size="8" font-weight="400"
        fill="#8A7A85" letter-spacing="2">discover · rate · share</text>
</svg>
